<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Goat Farm Manager Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        /* ===== GLASSMORPHISM THEME ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%) !important;
            min-height: 100vh;
            min-height: 100dvh;
            background-attachment: fixed;
        }
        [data-bs-theme="dark"] body {
            background: linear-gradient(135deg, #0b0e17 0%, #1a1f2e 100%) !important;
        }
        #wrapper {
            overflow-x: hidden;
            min-height: 100vh;
            min-height: 100dvh;
        }
        /* Sidebar */
        #sidebar {
            background: rgba(255, 255, 255, 0.25) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.4) !important;
            color: #1a1a2e !important;
            width: 260px;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 1rem;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1050;
            flex-shrink: 0;
        }
        [data-bs-theme="dark"] #sidebar {
            background: rgba(11, 14, 23, 0.7) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.06) !important;
            color: #e8edff !important;
        }
        #sidebar .nav-link {
            color: #1a1a2e !important;
            border-radius: 8px;
            padding: 0.6rem 0.75rem;
            margin-bottom: 2px;
            transition: all 0.2s;
        }
        [data-bs-theme="dark"] #sidebar .nav-link {
            color: #e8edff !important;
        }
        #sidebar .nav-link:hover {
            background: rgba(0, 0, 0, 0.05) !important;
        }
        [data-bs-theme="dark"] #sidebar .nav-link:hover {
            background: rgba(255, 255, 255, 0.05) !important;
        }
        #sidebar .nav-link.active {
            background: rgba(0, 0, 0, 0.08) !important;
            font-weight: 600;
        }
        [data-bs-theme="dark"] #sidebar .nav-link.active {
            background: rgba(74, 108, 247, 0.15) !important;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1049;
            backdrop-filter: blur(3px);
        }
        .sidebar-overlay.active {
            display: block;
        }
        .btn-toggle-sidebar {
            display: none !important;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .navbar-custom {
            background: rgba(255, 255, 255, 0.3) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4) !important;
            padding: 0.5rem 1rem;
        }
        [data-bs-theme="dark"] .navbar-custom {
            background: rgba(11, 14, 23, 0.5) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06) !important;
        }
        .navbar-custom .navbar-brand {
            color: #1a1a2e !important;
            font-weight: 600;
        }
        [data-bs-theme="dark"] .navbar-custom .navbar-brand {
            color: #e8edff !important;
        }
        .content-area {
            flex: 1;
            padding: 1.25rem;
            overflow-y: auto;
        }

        /* Cards & Glass */
        .card,
        .bg-white,
        .shadow-sm,
        .rounded,
        .table-responsive,
        .offcanvas,
        .modal-content {
            background: rgba(255, 255, 255, 0.35) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15) !important;
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .card,
        [data-bs-theme="dark"] .bg-white,
        [data-bs-theme="dark"] .shadow-sm,
        [data-bs-theme="dark"] .rounded,
        [data-bs-theme="dark"] .table-responsive,
        [data-bs-theme="dark"] .offcanvas,
        [data-bs-theme="dark"] .modal-content {
            background: rgba(11, 14, 23, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
            color: #e8edff !important;
        }
        .card-header {
            background: rgba(255, 255, 255, 0.25) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .card-header {
            background: rgba(255, 255, 255, 0.05) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06) !important;
            color: #e8edff !important;
        }
        .card-header i {
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .card-header i {
            color: #e8edff !important;
        }

        /* Table */
        .table {
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .table {
            color: #e8edff !important;
        }
        .table-dark {
            background: rgba(0, 0, 0, 0.08) !important;
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .table-dark {
            background: rgba(255, 255, 255, 0.05) !important;
            color: #e8edff !important;
        }
        .table td,
        .table th {
            border-color: rgba(0, 0, 0, 0.08) !important;
        }
        [data-bs-theme="dark"] .table td,
        [data-bs-theme="dark"] .table th {
            border-color: rgba(255, 255, 255, 0.06) !important;
        }
        .table-hover tbody tr:hover {
            background: rgba(0, 0, 0, 0.03) !important;
        }
        [data-bs-theme="dark"] .table-hover tbody tr:hover {
            background: rgba(255, 255, 255, 0.03) !important;
        }

        /* Form */
        .form-control,
        .form-select,
        .input-group-text {
            background: rgba(255, 255, 255, 0.5) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6) !important;
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .form-control,
        [data-bs-theme="dark"] .form-select,
        [data-bs-theme="dark"] .input-group-text {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: #e8edff !important;
        }
        .form-control::placeholder {
            color: rgba(0, 0, 0, 0.4) !important;
        }
        [data-bs-theme="dark"] .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3) !important;
        }
        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.7) !important;
            border-color: #4a6cf7 !important;
            box-shadow: 0 0 0 0.25rem rgba(74, 108, 247, 0.2) !important;
        }
        [data-bs-theme="dark"] .form-control:focus,
        [data-bs-theme="dark"] .form-select:focus {
            background: rgba(255, 255, 255, 0.1) !important;
        }
        .form-label {
            color: #1a1a2e !important;
            font-weight: 500;
        }
        [data-bs-theme="dark"] .form-label {
            color: #e8edff !important;
        }

        /* Buttons */
        .btn-primary {
            background: rgba(74, 108, 247, 0.2) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(74, 108, 247, 0.3) !important;
            color: #1a1a2e !important;
        }
        .btn-primary:hover {
            background: rgba(74, 108, 247, 0.35) !important;
        }
        [data-bs-theme="dark"] .btn-primary {
            color: #e8edff !important;
        }
        .btn-success {
            background: rgba(46, 204, 113, 0.2) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46, 204, 113, 0.3) !important;
            color: #1a1a2e !important;
        }
        .btn-success:hover {
            background: rgba(46, 204, 113, 0.35) !important;
        }
        [data-bs-theme="dark"] .btn-success {
            color: #e8edff !important;
        }
        .btn-danger {
            background: rgba(231, 76, 60, 0.2) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(231, 76, 60, 0.3) !important;
            color: #1a1a2e !important;
        }
        .btn-danger:hover {
            background: rgba(231, 76, 60, 0.35) !important;
        }
        [data-bs-theme="dark"] .btn-danger {
            color: #e8edff !important;
        }
        .btn-warning {
            background: rgba(241, 196, 15, 0.2) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(241, 196, 15, 0.3) !important;
            color: #1a1a2e !important;
        }
        .btn-warning:hover {
            background: rgba(241, 196, 15, 0.35) !important;
        }
        .btn-info {
            background: rgba(23, 162, 184, 0.2) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(23, 162, 184, 0.3) !important;
            color: #1a1a2e !important;
        }
        .btn-info:hover {
            background: rgba(23, 162, 184, 0.35) !important;
        }
        [data-bs-theme="dark"] .btn-info {
            color: #e8edff !important;
        }

        /* Badges */
        .badge {
            background: rgba(0, 0, 0, 0.08) !important;
            backdrop-filter: blur(5px);
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .badge {
            background: rgba(255, 255, 255, 0.08) !important;
            color: #e8edff !important;
        }
        .badge.bg-success {
            background: rgba(46, 204, 113, 0.3) !important;
        }
        .badge.bg-danger {
            background: rgba(231, 76, 60, 0.3) !important;
        }
        .badge.bg-warning {
            background: rgba(241, 196, 15, 0.3) !important;
        }
        .badge.bg-info {
            background: rgba(23, 162, 184, 0.3) !important;
        }
        .badge.bg-secondary {
            background: rgba(108, 117, 125, 0.3) !important;
        }

        /* Alerts */
        .alert {
            background: rgba(255, 255, 255, 0.4) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .alert {
            background: rgba(255, 255, 255, 0.05) !important;
            color: #e8edff !important;
        }
        .alert-danger {
            background: rgba(231, 76, 60, 0.15) !important;
        }
        .alert-success {
            background: rgba(46, 204, 113, 0.15) !important;
        }
        .alert-warning {
            background: rgba(241, 196, 15, 0.15) !important;
            color: #000 !important;
        }
        [data-bs-theme="dark"] .alert-warning {
            color: #e8edff !important;
        }

        /* Modal */
        .modal-content {
            background: rgba(255, 255, 255, 0.5) !important;
            backdrop-filter: blur(30px) !important;
            border: 1px solid rgba(255, 255, 255, 0.6) !important;
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .modal-content {
            background: rgba(11, 14, 23, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
            color: #e8edff !important;
        }
        .modal-header,
        .modal-footer {
            border-color: rgba(0, 0, 0, 0.05) !important;
        }
        [data-bs-theme="dark"] .modal-header,
        [data-bs-theme="dark"] .modal-footer {
            border-color: rgba(255, 255, 255, 0.06) !important;
        }

        /* Text */
        .text-muted {
            color: rgba(0, 0, 0, 0.5) !important;
        }
        [data-bs-theme="dark"] .text-muted {
            color: rgba(255, 255, 255, 0.4) !important;
        }
        .text-dark {
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .text-dark {
            color: #e8edff !important;
        }
        a,
        .nav-link {
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] a,
        [data-bs-theme="dark"] .nav-link {
            color: #e8edff !important;
        }
        a:hover,
        .nav-link:hover {
            color: #4a6cf7 !important;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.25);
        }
        [data-bs-theme="dark"] ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }
        [data-bs-theme="dark"] ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
        }
        [data-bs-theme="dark"] ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Page specific */
        .page-section {
            display: none;
        }
        .page-section.active {
            display: block;
        }

        /* Dashboard cards */
        .dashboard-card .card {
            padding: 0.75rem !important;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .dashboard-card h6 {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 2px;
        }
        .dashboard-card h3 {
            font-size: 1.4rem;
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .btn-toggle-sidebar {
                display: inline-block !important;
            }
            #sidebar {
                position: fixed !important;
                left: -300px !important;
                width: 280px !important;
                min-height: 100vh !important;
                top: 0;
                z-index: 1050;
                background: rgba(255, 255, 255, 0.6) !important;
                backdrop-filter: blur(25px) !important;
                padding: 1rem !important;
            }
            #sidebar.show {
                left: 0 !important;
            }
            .content-area {
                padding: 0.75rem !important;
            }
            .table {
                font-size: 0.75rem !important;
            }
            .table th,
            .table td {
                padding: 0.3rem 0.3rem !important;
                white-space: nowrap;
            }
            .form-control,
            .form-select {
                font-size: 0.9rem !important;
                min-height: 44px !important;
            }
            .dashboard-card .card {
                padding: 0.5rem !important;
                min-height: 60px;
            }
            .dashboard-card h6 {
                font-size: 0.65rem !important;
            }
            .dashboard-card h3 {
                font-size: 1rem !important;
            }
            .container-fluid {
                padding-left: 0.5rem !important;
                padding-right: 0.5rem !important;
            }
            .row>[class*="col-"] {
                padding-left: 0.4rem !important;
                padding-right: 0.4rem !important;
            }
            .modal-dialog {
                margin: 0.5rem !important;
            }
            .pagination {
                flex-wrap: wrap !important;
                gap: 0.2rem !important;
            }
            .pagination .page-link {
                padding: 0.3rem 0.6rem !important;
                font-size: 0.75rem !important;
            }
        }
        @media (min-width: 769px) {
            #sidebar {
                position: relative !important;
                left: 0 !important;
                width: 260px !important;
            }
            .sidebar-overlay {
                display: none !important;
            }
        }

        /* QR Scanner */
        #qr-reader {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }
        #qr-reader video {
            border-radius: 12px;
        }

        /* Misc */
        .border-left-danger {
            border-left: 4px solid #dc3545 !important;
        }
        .border-left-warning {
            border-left: 4px solid #ffc107 !important;
        }
        .border-left-success {
            border-left: 4px solid #28a745 !important;
        }
        .table-warning td {
            background: rgba(255, 193, 7, 0.1) !important;
        }
        [data-bs-theme="dark"] .table-warning td {
            background: rgba(255, 193, 7, 0.05) !important;
        }
        .console-output {
            background: rgba(0, 0, 0, 0.03) !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            padding: 12px;
            width: 100%;
            height: 150px;
            resize: none;
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .console-output {
            background: rgba(0, 0, 0, 0.3) !important;
            border-color: rgba(255, 255, 255, 0.06) !important;
            color: #b0c4ff !important;
        }
        .offcanvas {
            background: rgba(255, 255, 255, 0.5) !important;
            backdrop-filter: blur(30px) !important;
            border: 1px solid rgba(255, 255, 255, 0.6) !important;
            color: #1a1a2e !important;
        }
        [data-bs-theme="dark"] .offcanvas {
            background: rgba(11, 14, 23, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
            color: #e8edff !important;
        }
        .offcanvas-header {
            border-bottom: 1px solid rgba(0, 0, 0, 0.05) !important;
        }
        [data-bs-theme="dark"] .offcanvas-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.06) !important;
        }
    </style>
</head>
<body>

    <!-- ===== SIDEBAR OVERLAY (mobile) ===== -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- ===== WRAPPER ===== -->
    <div class="d-flex" id="wrapper">

        <!-- ===== SIDEBAR ===== -->
        <div id="sidebar" class="d-flex flex-column">
            <div class="text-center mb-3">
                <i class="bi bi-goat fs-1 text-primary"></i>
                <h5 class="mt-1 text-uppercase fw-bold" style="font-size:0.9rem;">Farm Management</h5>
            </div>
            <nav class="nav flex-column mb-auto" id="sidebarNav">
                <a class="nav-link" data-page="dashboard" href="#"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
                <a class="nav-link" data-page="animals" href="#"><i class="bi bi-people me-2"></i>Animals</a>
                <a class="nav-link" data-page="activities" href="#"><i class="bi bi-list-check me-2"></i>Activities</a>
                <a class="nav-link" data-page="finance" href="#"><i class="bi bi-cash-stack me-2"></i>Finance</a>
                <a class="nav-link" data-page="vaccination" href="#"><i class="bi bi-shield-check me-2"></i>Vaccination</a>
                <a class="nav-link" data-page="reports" href="#"><i class="bi bi-file-bar-graph me-2"></i>Reports</a>
                <a class="nav-link" data-page="inventory" href="#"><i class="bi bi-box-seam me-2"></i>Inventory</a>
                <a class="nav-link" data-page="tasks" href="#"><i class="bi bi-clipboard-check me-2"></i>Tasks Board</a>
                <a class="nav-link" data-page="scanner" href="#"><i class="bi bi-qr-code-scan me-2"></i>QR Scanner</a>
                <a class="nav-link" data-page="users" href="#" id="usersNavLink"><i class="bi bi-people-fill me-2"></i>Users</a>
            </nav>
            <div class="pt-3 border-top" style="border-color:rgba(0,0,0,0.1)!important;">
                <div class="d-flex align-items-center justify-content-between mb-2">
                    <span class="small text-muted"><i class="bi bi-circle-fill text-success" id="networkDot"></i> <span id="networkText">Online</span></span>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="darkModeToggle">
                        <label class="form-check-label small" for="darkModeToggle">Dark</label>
                    </div>
                </div>
                <button class="btn btn-danger btn-sm w-100" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Logout <span id="userBadge"></span></button>
            </div>
        </div>

        <!-- ===== MAIN CONTENT ===== -->
        <div class="main-content">

            <!-- Navbar -->
            <nav class="navbar navbar-expand navbar-custom">
                <div class="container-fluid">
                    <button class="btn btn-toggle-sidebar me-2" type="button" onclick="toggleSidebar()">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <span class="navbar-brand mb-0 h5" id="pageTitle"><i class="bi bi-house me-2"></i>Dashboard</span>
                    <button class="btn btn-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#filterCanvas">
                        <i class="bi bi-funnel"></i> Filters
                    </button>
                </div>
            </nav>

            <!-- Filter Offcanvas -->
            <div class="offcanvas offcanvas-end" id="filterCanvas">
                <div class="offcanvas-header border-bottom">
                    <h5><i class="bi bi-funnel-fill me-2"></i>Advanced Filters</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body">
                    <form id="filterForm" onsubmit="applyFilters(event)">
                        <div class="mb-2">
                            <label class="form-label small mb-1">Type</label>
                            <select name="type" class="form-select">
                                <option value="">All Types</option>
                                <option value="Goat">Goat</option>
                                <option value="Buck">Buck</option>
                                <option value="Castrated">Castrated</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small mb-1">Breed</label>
                            <input name="breed" class="form-control" placeholder="Search breed...">
                        </div>
                        <div class="mb-2">
                            <label class="form-label small mb-1">Health Status</label>
                            <select name="health_status" class="form-select">
                                <option value="">All</option>
                                <option value="Healthy">Healthy</option>
                                <option value="Sick">Sick</option>
                                <option value="Critical">Critical</option>
                            </select>
                        </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ============================================================
        // GOAT FARM MANAGER — Full JavaScript + IndexedDB Implementation
        // ============================================================

        // ---- GLOBALS ----
        let currentUser = null;
        let currentPage = 'dashboard';
        let currentAnimalId = null;
        let db = null;
        let dbReady = false;
        let filterState = {};
        let qrScannerInstance = null;

        // ---- INDEXEDDB ----
        const DB_NAME = 'GoatFarmDB';
        const DB_VERSION = 3;

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const d = e.target.result;
                    // Users
                    if (!d.objectStoreNames.contains('users')) {
                        const us = d.createObjectStore('users', { keyPath: 'id', autoIncrement: true });
                        us.createIndex('username', 'username', { unique: true });
                    }
                    // Sheds
                    if (!d.objectStoreNames.contains('sheds')) {
                        const ss = d.createObjectStore('sheds', { keyPath: 'id', autoIncrement: true });
                        ss.createIndex('name', 'name');
                    }
                    // Animals
                    if (!d.objectStoreNames.contains('animals')) {
                        const as = d.createObjectStore('animals', { keyPath: 'id', autoIncrement: true });
                        as.createIndex('auto_id', 'auto_id', { unique: true });
                        as.createIndex('status', 'status');
                        as.createIndex('type', 'type');
                        as.createIndex('health_status', 'health_status');
                        as.createIndex('shed_id', 'shed_id');
                        as.createIndex('mother_id', 'mother_id');
                        as.createIndex('father_id', 'father_id');
                    }
                    // Animal Costs
                    if (!d.objectStoreNames.contains('animal_costs')) {
                        const ac = d.createObjectStore('animal_costs', { keyPath: 'id', autoIncrement: true });
                        ac.createIndex('animal_id', 'animal_id');
                    }
                    // Activities
                    if (!d.objectStoreNames.contains('activities')) {
                        const act = d.createObjectStore('activities', { keyPath: 'id', autoIncrement: true });
                        act.createIndex('animal_id', 'animal_id');
                        act.createIndex('activity_type', 'activity_type');
                        act.createIndex('activity_date', 'activity_date');
                    }
                    // Milk Production
                    if (!d.objectStoreNames.contains('milk_production')) {
                        const mp = d.createObjectStore('milk_production', { keyPath: 'id', autoIncrement: true });
                        mp.createIndex('animal_id', 'animal_id');
                        mp.createIndex('record_date', 'record_date');
                    }
                    // Feed Consumption
                    if (!d.objectStoreNames.contains('feed_consumption')) {
                        const fc = d.createObjectStore('feed_consumption', { keyPath: 'id', autoIncrement: true });
                        fc.createIndex('shed_id', 'shed_id');
                        fc.createIndex('record_date', 'record_date');
                    }
                    // Transactions
                    if (!d.objectStoreNames.contains('transactions')) {
                        const tx = d.createObjectStore('transactions', { keyPath: 'id', autoIncrement: true });
                        tx.createIndex('animal_id', 'animal_id');
                        tx.createIndex('type', 'type');
                        tx.createIndex('trans_date', 'trans_date');
                    }
                    // Vaccines
                    if (!d.objectStoreNames.contains('vaccines')) {
                        const vx = d.createObjectStore('vaccines', { keyPath: 'id', autoIncrement: true });
                        vx.createIndex('name', 'name');
                    }
                    // Vaccine Stock
                    if (!d.objectStoreNames.contains('vaccine_stock')) {
                        const vs = d.createObjectStore('vaccine_stock', { keyPath: 'id', autoIncrement: true });
                        vs.createIndex('vaccine_id', 'vaccine_id');
                        vs.createIndex('expiry_date', 'expiry_date');
                    }
                    // Vaccination Records
                    if (!d.objectStoreNames.contains('vaccination_records')) {
                        const vr = d.createObjectStore('vaccination_records', { keyPath: 'id', autoIncrement: true });
                        vr.createIndex('animal_id', 'animal_id');
                        vr.createIndex('vaccine_id', 'vaccine_id');
                        vr.createIndex('status', 'status');
                        vr.createIndex('due_date', 'due_date');
                    }
                    // Weight Records
                    if (!d.objectStoreNames.contains('weight_records')) {
                        const wr = d.createObjectStore('weight_records', { keyPath: 'id', autoIncrement: true });
                        wr.createIndex('animal_id', 'animal_id');
                        wr.createIndex('record_date', 'record_date');
                    }
                    // Employee Tasks
                    if (!d.objectStoreNames.contains('employee_tasks')) {
                        const et = d.createObjectStore('employee_tasks', { keyPath: 'id', autoIncrement: true });
                        et.createIndex('assigned_to_id', 'assigned_to_id');
                        et.createIndex('status', 'status');
                        et.createIndex('due_date', 'due_date');
                    }
                    // Alerts
                    if (!d.objectStoreNames.contains('alerts')) {
                        const al = d.createObjectStore('alerts', { keyPath: 'id', autoIncrement: true });
                        al.createIndex('animal_id', 'animal_id');
                        al.createIndex('is_read', 'is_read');
                        al.createIndex('created_at', 'created_at');
                    }
                };
                req.onsuccess = (e) => {
                    db = e.target.result;
                    dbReady = true;
                    resolve(db);
                };
                req.onerror = (e) => reject(e.target.error);
            });
        }

        function dbAdd(store, data) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readwrite');
                const req = tx.objectStore(store).add(data);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        function dbPut(store, data) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readwrite');
                const req = tx.objectStore(store).put(data);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        function dbDelete(store, id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readwrite');
                const req = tx.objectStore(store).delete(id);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        function dbGetAll(store, index, value) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readonly');
                let req;
                if (index && value !== undefined) {
                    req = tx.objectStore(store).index(index).getAll(value);
                } else {
                    req = tx.objectStore(store).getAll();
                }
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        function dbGet(store, id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readonly');
                const req = tx.objectStore(store).get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        function dbGetByIndex(store, index, value) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readonly');
                const req = tx.objectStore(store).index(index).get(value);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        function dbGetAllByIndex(store, index, value) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readonly');
                const req = tx.objectStore(store).index(index).getAll(value);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        // ---- HELPERS ----
        function e(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function getAge(dob) {
            if (!dob) return 'N/A';
            try {
                const d = new Date(dob);
                const now = new Date();
                let years = now.getFullYear() - d.getFullYear();
                let months = now.getMonth() - d.getMonth();
                if (months < 0) { years--;
                    months += 12; }
                if (years > 0) return years + 'y ' + months + 'm';
                return months + 'm';
            } catch (e) { return 'N/A'; }
        }

        function generateAutoID(type) {
            const prefix = { 'Goat': 'c', 'Buck': 'p', 'Castrated': 'k' } [type] || 'x';
            return prefix + (Date.now() % 100000);
        }

        function formatDate(d) {
            if (!d) return '-';
            return new Date(d).toISOString().split('T')[0];
        }

        function today() {
            return new Date().toISOString().split('T')[0];
        }

        function addDays(date, days) {
            const d = new Date(date);
            d.setDate(d.getDate() + days);
            return d.toISOString().split('T')[0];
        }

        function calcTotalCost(animalId) {
            return new Promise((resolve) => {
                dbGetAllByIndex('animal_costs', 'animal_id', animalId).then(costs => {
                    let total = 0;
                    costs.forEach(c => total += c.amount || 0);
                    resolve(total);
                }).catch(() => resolve(0));
            });
        }

        function showAlert(msg, type = 'success') {
            const area = document.getElementById('alertArea');
            if (!area) {
                const d = document.createElement('div');
                d.id = 'alertArea';
                d.className = 'mb-3';
                const container = document.querySelector('.content-area .page-section.active') || document
                .querySelector('.content-area');
                container.prepend(d);
            }
            const el = document.getElementById('alertArea');
            el.innerHTML =
                `<div class="alert alert-${type} alert-dismissible fade show" role="alert">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
            setTimeout(() => { const a = document.querySelector('.alert'); if (a) a.remove(); }, 5000);
        }

        // ---- AUTH ----
        function checkAuth() {
            const user = JSON.parse(sessionStorage.getItem('goatUser') || 'null');
            if (user) {
                currentUser = user;
                document.getElementById('userBadge').textContent = '(' + e(user.username) + ')';
                document.getElementById('usersNavLink').style.display = user.role === 'admin' ? '' : 'none';
                return true;
            }
            return false;
        }

        function login(username, password) {
            return new Promise((resolve, reject) => {
                dbGetAll('users').then(users => {
                    const user = users.find(u => u.username === username);
                    if (!user) { reject('Invalid credentials'); return; }
                    // Simple password check (in production, use bcrypt)
                    if (user.password !== password) { reject('Invalid credentials'); return; }
                    currentUser = user;
                    sessionStorage.setItem('goatUser', JSON.stringify(user));
                    document.getElementById('userBadge').textContent = '(' + e(user.username) + ')';
                    document.getElementById('usersNavLink').style.display = user.role === 'admin' ? '' : 'none';
                    resolve(user);
                }).catch(reject);
            });
        }

        function logout() {
            currentUser = null;
            sessionStorage.removeItem('goatUser');
            location.reload();
        }

        // ---- ROUTER ----
        function navigateTo(page, params) {
            if (page === 'login') {
                showLogin();
                return;
            }
            if (!checkAuth()) {
                showLogin();
                return;
            }
            currentPage = page;
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
            const target = document.getElementById('page-' + page);
            if (target) {
                target.classList.add('active');
            } else {
                // fallback
                document.getElementById('page-dashboard').classList.add('active');
            }
            // Update nav
            document.querySelectorAll('#sidebarNav .nav-link').forEach(el => el.classList.remove('active'));
            const navLink = document.querySelector(`#sidebarNav .nav-link[data-page="${page}"]`);
            if (navLink) navLink.classList.add('active');
            const titles = {
                dashboard: 'Dashboard',
                animals: 'Animals',
                activities: 'Activities',
                finance: 'Finance',
                vaccination: 'Vaccination',
                reports: 'Reports',
                inventory: 'Inventory',
                tasks: 'Tasks Board',
                scanner: 'QR Scanner',
                users: 'Users',
                animal_profile: 'Animal Profile',
                animal_form: 'Animal Form'
            };
            document.getElementById('pageTitle').innerHTML = `<i class="bi me-2"></i>${titles[page] || page}`;
            // Render
            renderPage(page, params);
            // Close mobile sidebar
            document.getElementById('sidebar').classList.remove('show');
            document.querySelector('.sidebar-overlay').classList.remove('active');
            // Scroll to top
            document.querySelector('.content-area').scrollTop = 0;
        }

        function renderPage(page, params) {
            switch (page) {
                case 'dashboard':
                    renderDashboard();
                    break;
                case 'animals':
                    renderAnimals(params);
                    break;
                case 'activities':
                    renderActivities(params);
                    break;
                case 'finance':
                    renderFinance(params);
                    break;
                case 'vaccination':
                    renderVaccination(params);
                    break;
                case 'reports':
                    renderReports(params);
                    break;
                case 'inventory':
                    renderInventory(params);
                    break;
                case 'tasks':
                    renderTasks(params);
                    break;
                case 'scanner':
                    renderScanner(params);
                    break;
                case 'users':
                    renderUsers(params);
                    break;
                case 'animal_profile':
                    renderAnimalProfile(params);
                    break;
                case 'animal_form':
                    renderAnimalForm(params);
                    break;
                default:
                    renderDashboard();
            }
        }

        // ---- LOGIN PAGE ----
        function showLogin() {
            document.querySelector('.main-content').innerHTML = `
                <div class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
                    <div class="card p-4 shadow-lg" style="max-width:400px;width:100%;">
                        <div class="text-center mb-3">
                            <i class="bi bi-goat fs-1 text-primary"></i>
                            <h4 class="mt-2 text-uppercase fw-bold">Farm Manager Pro</h4>
                            <p class="small text-muted">Secure Sign-On Portal</p>
                        </div>
                        <form onsubmit="handleLogin(event)">
                            <div class="mb-3">
                                <input name="username" class="form-control" placeholder="Username" required autocomplete="off">
                            </div>
                            <div class="mb-3">
                                <input type="password" name="password" class="form-control" placeholder="Password" required>
                            </div>
                            <div id="loginAlert"></div>
                            <button class="btn btn-primary w-100">Sign In</button>
                        </form>
                        <div class="mt-3 border-top pt-2 text-center">
                            <small class="text-muted">Default: admin / password</small>
                        </div>
                    </div>
                </div>
            `;
        }

        function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const username = form.querySelector('[name="username"]').value;
            const password = form.querySelector('[name="password"]').value;
            login(username, password).then(() => {
                location.reload();
            }).catch(err => {
                document.getElementById('loginAlert').innerHTML =
                    `<div class="alert alert-danger py-2 small">${e(err)}</div>`;
            });
        }

        // ---- DASHBOARD ----
        async function renderDashboard() {
            const container = document.getElementById('dashboardContent');
            const animals = await dbGetAll('animals');
            const active = animals.filter(a => a.status === 'Active');
            const total = active.length;
            const kids = active.filter(a => {
                if (!a.dob) return false;
                const age = getAgeMonths(a.dob);
                return age <= 3;
            }).length;
            const breedingReady = active.filter(a => {
                if (!a.dob) return false;
                const age = getAgeMonths(a.dob);
                return a.health_status === 'Healthy' && a.pregnancy_status === 'Not Pregnant' && age >= 8;
            }).length;
            const readyForSale = active.filter(a => a.sale_readiness === 'Ready').length;
            const sick = active.filter(a => a.health_status === 'Sick' || a.health_status === 'Critical').length;

            // Expiring vaccines
            const stocks = await dbGetAll('vaccine_stock');
            const expiring = stocks.filter(s => {
                if (!s.expiry_date) return false;
                const d = new Date(s.expiry_date);
                const now = new Date();
                const diff = (d - now) / (1000 * 60 * 60 * 24);
                return diff <= 30 && diff >= 0 && (s.stock_quantity || 0) > 0;
            });
            const vaccines = await dbGetAll('vaccines');
            const vmap = {};
            vaccines.forEach(v => vmap[v.id] = v.name);

            // Withdrawal
            const activities = await dbGetAll('activities');
            const now = new Date();
            const withdrawal = activities.filter(a => {
                if (!a.withdrawal_end_date) return false;
                const d = new Date(a.withdrawal_end_date);

            if (!dob) return 0;
            try {

                const now = new Date();
                return (now.getFullYear() - d.getFullYear()) * 12 + (now.getMonth() - d.getMonth());
            } catch (e) { return 0; }
        }

        async function saveAnimal(e, id) {
            e.preventDefault();
            const form = e.target;
            const data = new FormData(form);
            const obj = {};
            for (const [key, val] of data) {
                if (val !== '') obj[key] = val;
            }
            // Parse numbers
            const numFields = ['weight', 'temp_celsius', 'pulse_rate', 'resp_rate', 'purchase_price', 'selling_price',
                'shed_id', 'mother_id', 'father_id'
            ];
            for (const f of numFields) {
                if (obj[f] !== undefined && obj[f] !== '') obj[f] = parseFloat(obj[f]);
                else if (obj[f] === '') obj[f] = null;
            }
            // Dates
            const dateFields = ['dob', 'last_heat_date', 'next_heat_date', 'kidding_date'];
            for (const f of dateFields) {
                if (obj[f] === '') obj[f] = null;
            }

            if (id) {
                // Edit
                const existing = await dbGet('animals', id);
                if (!existing) { showAlert('Animal not found', 'danger'); return; }
                const updated = { ...existing, ...obj };
                await dbPut('animals', updated);
                showAlert('Profile saved.');
            } else {
                // Add
                const type = obj.type || 'Goat';
                const auto_id = generateAutoID(type);
                const animal = {
                    auto_id,
                    name: obj.name || '',
                    type: type,
                    breed: obj.breed || '',
                    color: obj.color || '',
                    dob: obj.dob || null,
                    weight: obj.weight || 0,
                    health_status: obj.health_status || 'Healthy',
                    vaccination_status: 'Pending',
                    pregnancy_status: obj.pregnancy_status || 'Not Pregnant',
                    sale_readiness: obj.sale_readiness || 'Not Ready',
                    status: obj.status || 'Active',
                    shed_id: obj.shed_id || null,
                    mother_id: obj.mother_id || null,
                    father_id: obj.father_id || null,
                    purchase_type: obj.purchase_type || 'Born',
                    purchase_price: obj.purchase_price || 0,
                    selling_price: obj.selling_price || null,
                    image: 'default.png',
                    notes: obj.notes || '',
                    temp_celsius: obj.temp_celsius || null,
                    pulse_rate: obj.pulse_rate || null,
                    resp_rate: obj.resp_rate || null,
                    kidding_date: obj.kidding_date || null,
                    last_heat_date: obj.last_heat_date || null,
                    next_heat_date: obj.next_heat_date || null,
                    created_at: new Date().toISOString()
                };
                const newId = await dbAdd('animals', animal);
                if (obj.purchase_type === 'Purchased' && obj.purchase_price > 0) {
                    await dbAdd('animal_costs', { animal_id: newId, category: 'Other', amount: parseFloat(obj
                            .purchase_price), cost_date: today(), note: 'Purchase Expense' });
                    await dbAdd('transactions', { animal_id: newId, type: 'Expense', category: 'Purchase',
                        amount: parseFloat(obj.purchase_price), trans_date: today(),
                        description: 'Purchase of stock ID ' + auto_id });
                }
                showAlert('Animal ' + auto_id + ' logged.');
            }
            navigateTo('animals');
        }

        async function deleteAnimal(id) {
            if (!confirm('Delete this animal permanently?')) return;
            await dbDelete('animals', id);
            // Also delete related records
            const costs = await dbGetAllByIndex('animal_costs', 'animal_id', id);
            for (const c of costs) await dbDelete('animal_costs', c.id);
            const acts = await dbGetAllByIndex('activities', 'animal_id', id);
            for (const a of acts) await dbDelete('activities', a.id);
            const wrs = await dbGetAllByIndex('weight_records', 'animal_id', id);
            for (const w of wrs) await dbDelete('weight_records', w.id);
            showAlert('Animal deleted.');
            navigateTo('animals');
        }

        async function logActivity(e) {
            e.preventDefault();
            const form = e.target;
            const data = new FormData(form);
            const animal_id = data.get('animal_id') ? parseInt(data.get('animal_id')) : null;
            const type = data.get('activity_type') || 'Feeding';
            const date = data.get('activity_date') || today();
            const desc = data.get('description') || '';
            const amount = parseFloat(data.get('amount')) || 0;
            const withdrawal_days = parseInt(document.getElementById('withdrawal_days')?.value) || 0;
            const withdrawal_end_date = withdrawal_days > 0 ? addDays(date, withdrawal_days) : null;

            let allow_mating = true;
            let finalDesc = desc;

            // Kidding
            if (type === 'Kidding' && animal_id) {
                const kidCount = parseInt(document.getElementById('kid_count')?.value) || 0;
                const kidsData = [];
                for (let i = 1; i <= kidCount; i++) {
                    const sex = document.querySelector(`[name="kid_sex_${i}"]`)?.value || 'Female';
                    const weight = parseFloat(document.querySelector(`[name="kid_weight_${i}"]`)?.value) || 0;
                    if (weight > 0) kidsData.push({ sex, weight });
                }
                if (kidsData.length > 0) {
                    await registerKidding(animal_id, kidsData, date);
                    showAlert('Kidding logged. ' + kidsData.length + ' kids registered.');
                } else {
                    showAlert('Kidding logged, no valid kids data.', 'warning');
                }
                finalDesc = 'Kidding occurred. ' + desc;
            }

            // Breeding
            if (type === 'Breeding' && animal_id) {
                const an = await dbGet('animals', animal_id);
                if (an && an.type === 'Goat') {
                    const ageMonths = getAgeMonths(an.dob);
                    if (ageMonths < 7) { showAlert('Under-age.', 'danger');
                        allow_mating = false; }
                    if ((an.weight || 0) < 12.00) { showAlert('Under-weight.', 'danger');
                        allow_mating = false; }
                    if (allow_mating) {
                        const next_heat = addDays(date, 21);
                        an.last_heat_date = date;
                        an.next_heat_date = next_heat;
                        an.pregnancy_status = 'Pregnant';
                        await dbPut('animals', an);
                        const est_start = addDays(date, 142);
                        const est_end = addDays(date, 158);
                        finalDesc += ' [Pregnancy window: ' + est_start + ' to ' + est_end + ']';
                    }
                }
            }

            if (allow_mating) {
                const activity = {
                    animal_id: animal_id,
                    activity_type: type,
                    activity_date: date,
                    description: finalDesc,
                    amount: amount,
                    user_id: currentUser?.id || null,
                    withdrawal_end_date: withdrawal_end_date,
                    created_at: new Date().toISOString()
                };
                const actId = await dbAdd('activities', activity);

                if (animal_id) {
                    const an = await dbGet('animals', animal_id);
                    if (an) {
                        if (type === 'Vaccination') {
                            an.vaccination_status = 'Complete';
                            await dbPut('animals', an);
                        } else if (type === 'Sale') {
                            // Check withdrawal
                            const activitiesAll = await dbGetAllByIndex('activities', 'animal_id', animal_id);
                            const inWithdrawal = activitiesAll.some(a2 => a2.withdrawal_end_date && a2
                                .withdrawal_end_date >= today());
                            if (inWithdrawal) {
                                showAlert('Sale blocked: In withdrawal period.', 'danger');
                                return;
                            }
                            an.status = 'Sold';
                            an.selling_price = amount;
                            await dbPut('animals', an);
                            await dbAdd('transactions', { animal_id, type: 'Income', category: 'Sale',
                                amount, trans_date: date, description: desc });
                        } else if (type === 'Death') {
                            an.status = 'Dead';
                            await dbPut('animals', an);
                        } else if (type === 'Expense') {
                            await dbAdd('animal_costs', { animal_id, category: 'Other', amount, cost_date: date,
                                note: desc });
                            await dbAdd('transactions', { animal_id, type: 'Expense', category: 'General Expense',
                                amount, trans_date: date, description: desc });
                        }
                    }
                }
                showAlert('Activity logged.');
                // Reset form
                form.reset();
                document.getElementById('activity_date').value = today();
                document.getElementById('kid_inputs').innerHTML = '';
            }
            renderActivities();
        }

            if (filterState.type) transactions = transactions.filter(t => t.type === filterState.type);

            const sorted = transactions.sort((a, b) => new Date(b.trans_date) - new Date(a.trans_date)).slice(0, 100);
            const income = transactions.filter(t => t.type === 'Income').reduce((s, t) => s + (t.amount || 0), 0);
            const expense = transactions.filter(t => t.type === 'Expense').reduce((s, t) => s + (t.amount || 0), 0);

                        new Chart(ctx, {

            for (const a of animals) {
                const cost = await calcTotalCost(a.id);
                const profit = a.selling_price ? a.selling_price - cost : null;
                rows.push({
                    auto_id: a.auto_id,
                    name: a.name || '',
                    type: a.type,
                    shed: a.shed_name || 'N/A',
                    cost: cost.toFixed(2),
                    value: a.selling_price ? a.selling_price.toFixed(2) : '0.00',
                    profit: profit !== null ? profit.toFixed(2) : 'N/A',
                    min_sell: (cost * 1.10).toFixed(2)
                });
            }
            const headers = ['Auto ID', 'Name', 'Type', 'Shed', 'Total Cost', 'Market Value', 'Profit', 'Min Sell'];
            let csv = headers.join(',') + '\n';
            for (const r of rows) {
                csv += Object.values(r).map(v => '"' + v + '"').join(',') + '\n';
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Farm_Report_' + new Date().toISOString().split('T')[0] + '.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function initQRScanner() {
            if (qrScannerInstance) {
                qrScannerInstance.clear().catch(() => {});
                qrScannerInstance = null;
            }
            const element = document.getElementById('qr-reader');
            if (!element) return;
            try {
                qrScannerInstance = new Html5QrcodeScanner(
                    'qr-reader', { fps: 10, qrbox: { width: 250, height: 250 } }, false
                );
                qrScannerInstance.render(onQRScanSuccess, onQRScanFailure);
            } catch (e) {
                console.log('QR Scanner init error:', e);
            }
        }

        function onQRScanSuccess(decodedText) {
            if (qrScannerInstance) {
                qrScannerInstance.clear().catch(() => {});
                qrScannerInstance = null;
            }
            document.getElementById('qr-reader-results').innerText = 'Redirecting to Profile...';
            // Try to extract ID from URL
            const match = decodedText.match(/id=(\d+)/);
            if (match) {
                const id = parseInt(match[1]);
                viewAnimal(id);
            } else {
                alert('Scanned Output: ' + decodedText);
                // Re-init scanner
                setTimeout(() => initQRScanner(), 1000);
            }
        }

        function onQRScanFailure(error) {
            // Silent
        }

                    <div class="mb-2"><label class="form-label small">Date</label><input type="date" name="cost_date" class="form-control" value="${today()}" required></div>
                    <div class="mb-3"><label class="form-label small">Note</label><input name="note" class="form-control" required></div>
                    <button class="btn btn-primary w-100">Save</button>
                </form>
            `;
            const modal = new bootstrap.Modal(document.getElementById('profileCostModal'));
            modal.show();
        }

        async function logProfileCost(e, animalId) {
            e.preventDefault();
            const form = e.target;
            const data = new FormData(form);
            const category = data.get('category') || 'Other';
            const amount = parseFloat(data.get('amount')) || 0;
            const cost_date = data.get('cost_date') || today();
            const note = data.get('note') || '';
            if (amount > 0) {
                await dbAdd('animal_costs', { animal_id: animalId, category, amount, cost_date, note });
                await dbAdd('transactions', { animal_id: animalId, type: 'Expense', category, amount, trans_date: cost_date,
                    description: 'Profile Log: ' + note });
                showAlert('Cost entry logged successfully.');
                const modal = bootstrap.Modal.getInstance(document.getElementById('profileCostModal'));
                if (modal) modal.hide();
                viewAnimal(animalId);
            }
        }

        // ---- AUTOMATION ----
        async function runAutomation() {
            // 1. Mark overdue vaccinations
            const records = await dbGetAll('vaccination_records');
            for (const r of records) {
                if (r.status === 'Pending' && r.due_date && r.due_date < today()) {
                    r.status = 'Overdue';
                    await dbPut('vaccination_records', r);
                    // Update animal
                    const an = await dbGet('animals', r.animal_id);
                    if (an) {
                        an.vaccination_status = 'Overdue';
                        await dbPut('animals', an);
                    }
                }
            }

            // 2. Schedule vaccines based on age
            const animals = await dbGetAll('animals');
            const vaccines = await dbGetAll('vaccines');
            for (const a of animals) {
                if (a.status !== 'Active' || !a.dob) continue;
                const ageMonths = getAgeMonths(a.dob);
                for (const v of vaccines) {
                    let dueDate = null;
                    if (v.name.toLowerCase().includes('cdt')) {
                        const ageDays = Math.floor((new Date() - new Date(a.dob)) / (1000 * 60 * 60 * 24));
                        if (ageDays >= 3 && ageDays <= 16) dueDate = addDays(a.dob, 3);
                        else if (ageDays >= 17 && ageDays <= 89) dueDate = addDays(a.dob, 17);
                        else if (ageDays >= 90) dueDate = addDays(a.dob, 90);
                    } else {
                        if (ageMonths >= v.recommended_age_months) {
                            dueDate = addDays(a.dob, v.recommended_age_months * 30);
                        }
                    }
                    if (dueDate) {
                        const existing = await dbGetAllByIndex('vaccination_records', 'animal_id', a.id);
                        const found = existing.some(r => r.vaccine_id === v.id && r.due_date === dueDate);
                        if (!found) {
                            await dbAdd('vaccination_records', { animal_id: a.id, vaccine_id: v.id, due_date: dueDate,
                                status: 'Pending', given_date: null });
                        }
                    }
                }
            }

            // 3. Seasonal deworming alerts
            const month = new Date().getMonth() + 1;
            if ([5, 6, 10, 11].includes(month)) {
                const msg = "Seasonal Herd Deworming Alert: DLS rules recommend concurrent herd-wide deworming administration.";
                const alerts = await dbGetAll('alerts');
                const exists = alerts.some(a => a.message === msg && !a.is_read);
                if (!exists) {
                    await dbAdd('alerts', { animal_id: null, message: msg, type: 'Deworming Alert', is_read: 0,
                        created_at: new Date().toISOString() });
                }
            }
        }

        // ---- SIDEBAR TOGGLE ----
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('show');
            if (overlay) overlay.classList.toggle('active');
        }

        // ---- INIT ----
        document.addEventListener('DOMContentLoaded', function() {
            // Dark mode
            const themeToggle = document.getElementById('darkModeToggle');
            const html = document.documentElement;
            const savedTheme = localStorage.getItem('goat-theme') || 'light';
            html.setAttribute('data-bs-theme', savedTheme);
            themeToggle.checked = savedTheme === 'dark';
            themeToggle.addEventListener('change', function() {
                const theme = this.checked ? 'dark' : 'light';
                html.setAttribute('data-bs-theme', theme);
                localStorage.setItem('goat-theme', theme);
            });

            // Network status
            function updateNetwork() {
                const dot = document.getElementById('networkDot');
                const text = document.getElementById('networkText');
                if (navigator.onLine) {
                    dot.className = 'bi bi-circle-fill text-success';
                    text.textContent = 'Online';
                } else {
                    dot.className = 'bi bi-circle-fill text-danger';
                    text.textContent = 'Offline';
                }
            }
            window.addEventListener('online', updateNetwork);
            window.addEventListener('offline', updateNetwork);
            updateNetwork();

            // Sidebar clicks
            document.querySelectorAll('#sidebarNav .nav-link').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    const page = this.dataset.page;
                    if (page) navigateTo(page);
                });
            });

            // Open DB and start
            openDB().then(() => {
                // Seed default data if empty
                return seedDatabase();
            }).then(() => {
                if (checkAuth()) {
                    navigateTo('dashboard');
                } else {
                    showLogin();
                }
                // Run automation
                runAutomation();
                // Auto-refresh every 5 min
                setInterval(() => {
                    if (checkAuth() && currentPage) {
                        renderPage(currentPage);
                    }
                }, 300000);
            }).catch(err => {
                console.error('DB init error:', err);
                document.querySelector('.main-content').innerHTML =
                    `<div class="alert alert-danger m-4">Database initialization failed: ${err.message}</div>`;
            });
        });

        // ---- SEED DATABASE ----
        async function seedDatabase() {
            // Check if users exist
            const users = await dbGetAll('users');
            if (users.length === 0) {
                await dbAdd('users', { username: 'admin', password: 'password', role: 'admin',
                    created_at: new Date().toISOString() });
                await dbAdd('users', { username: 'manager', password: 'password', role: 'manager',
                    created_at: new Date().toISOString() });
                await dbAdd('users', { username: 'worker', password: 'password', role: 'worker',
                    created_at: new Date().toISOString() });
            }

            // Check sheds
            const sheds = await dbGetAll('sheds');
            if (sheds.length === 0) {
                await dbAdd('sheds', { name: 'Shed A', location: 'North Wing' });
                await dbAdd('sheds', { name: 'Shed B', location: 'South Wing' });
                await dbAdd('sheds', { name: 'Shed C', location: 'East Wing' });
            }

            // Check vaccines
            const vaccines = await dbGetAll('vaccines');
            if (vaccines.length === 0) {
                await dbAdd('vaccines', { name: 'CDT Vaccine', recommended_age_months: 3, repeat_months: 12 });
                await dbAdd('vaccines', { name: 'PPR Vaccine', recommended_age_months: 6, repeat_months: 12 });
                await dbAdd('vaccines', { name: 'Foot Rot Vaccine', recommended_age_months: 12, repeat_months: 6 });
            }
        }

        // ---- GLOBAL EXPOSURE FOR ONCLICK ----
        window.navigateTo = navigateTo;
        window.viewAnimal = viewAnimal;
        window.editAnimal = editAnimal;
        window.showAnimalForm = showAnimalForm;
        window.saveAnimal = saveAnimal;
        window.deleteAnimal = deleteAnimal;
        window.logActivity = logActivity;
        window.logMilk = logMilk;
        window.showBulkModal = showBulkModal;
        window.bulkOperation = bulkOperation;
        window.toggleActivityFields = toggleActivityFields;
        window.generateKidFields = generateKidFields;
        window.showTransModal = showTransModal;
        window.addTransaction = addTransaction;
        window.addVaccineRule = addVaccineRule;
        window.showSchedModal = showSchedModal;
        window.scheduleVaccination = scheduleVaccination;
        window.completeVaccination = completeVaccination;
        window.exportCSV = exportCSV;
        window.addStock = addStock;
        window.logFeed = logFeed;
        window.addTask = addTask;
        window.completeTask = completeTask;
        window.showWeightModal = showWeightModal;
        window.logWeight = logWeight;
        window.showProfileCostModal = showProfileCostModal;
        window.logProfileCost = logProfileCost;
        window.addUser = addUser;
        window.deleteUser = deleteUser;
        window.handleLogin = handleLogin;
        window.logout = logout;
        window.toggleSidebar = toggleSidebar;
        window.applyAnimalFilters = applyAnimalFilters;
        window.clearAnimalFilters = clearAnimalFilters;
        window.applyFilters = applyFilters;
        window.clearFilters = clearFilters;
        window.onQRScanSuccess = onQRScanSuccess;
        window.onQRScanFailure = onQRScanFailure;
        window.initQRScanner = initQRScanner;
    </script>
